      - generic [ref=e100]:
        - generic [ref=e101]:
          - heading "① 温度 · Emotion Temp" [level=4] [ref=e102]
          - paragraph [ref=e103]: 文字自带的情感体温，它决定了读者与文本之间的心理阻隔屏障。从巴特零度到炽烈红莲的漫长光谱。
          - generic [ref=e104]: "\"读完觉得重，但找不到一句温吞的情话。\""
        - generic [ref=e105]:
          - heading "② 密度 · Info Density" [level=4] [ref=e106]
          - paragraph [ref=e107]: 单位篇幅内的信息量与意感叠加。排字带有留白多还是意象窒息。决定了读者的认知消化减速比。
          - generic [ref=e108]: "\"前景化层叠。同一句话，你需要读第二遍。\""
        - generic [ref=e109]:
          - heading "③ 透明度 · Significance clarity" [level=4] [ref=e110]
          - paragraph [ref=e111]: 文字的解码层深。从一目澄明直达人心，到象征层叠的燕卜荪七型美学含混。
          - generic [ref=e112]: "\"你确信它说了什么，但不保证它只说了这件。\""
        - generic [ref=e113]:
          - heading "④ 余韵 · Sensational Echo" [level=4] [ref=e114]
          - paragraph [ref=e115]: 阅毕合卷后，残留在体内的感知和弦。这是文字最难被模仿和假造的质地。
          - generic [ref=e116]: "\"读时顺喉，咽后半日仍在口齿留有苦辛。\""
        - generic [ref=e117]:
          - heading "⑤ 张力 · Dynamic Tension" [level=4] [ref=e118]
          - paragraph [ref=e119]: 文本的内在拉拔。叙说与深沉沉默的抗衡、单声道随侍与诸声和弦巴赫金复调的角力。
          - generic [ref=e120]: "\"结尾处他一言不发，但你听到了万马奔腾。\""
        - generic [ref=e121]:
          - heading "⑥ 意象域 · Metaphor Domain" [level=4] [ref=e122]
          - paragraph [ref=e123]: 在何种质地的物质域中，构建并折射感知体系。什克洛夫斯基的陌生化打破语言自动化。
          - generic [ref=e124]: "\"用矿物或古老水声的罕见对位建立起感知新大陆。\""
        - generic [ref=e125]:
          - heading "⑦ 时间感 · Time Perception" [level=4] [ref=e126]
          - paragraph [ref=e127]: 文本处理时间流速的双向缩放。是压缩流逝（如‘百年孤独’般的长卷缩骨），还是主观延缓进程（普鲁斯特式的意识精洗）。
          - generic [ref=e128]: "\"在一个漫长的下午，他把一生的悔恨写进那行只用了三秒完成的签名。\""
        - generic [ref=e129]:
          - heading "⑧ 诚实度 · Sincerity Ethos" [level=4] [ref=e130]
          - paragraph [ref=e131]: 隐含作者的心理安全防备姿态。是安设表演性的自恋修辞，还是回归诚挚直面个人内心最艰难、最原生态的脆弱体验。
          - generic [ref=e132]: "\"不为了叫好而增设藻饰，哪怕最后捧出的是带血的粗鄙本真。\""
        - generic [ref=e133]:
          - heading "⑨ 文化层 · Intertextual Depth" [level=4] [ref=e134]
          - paragraph [ref=e135]: 文本中蕴藏的典故包浆、文本互涉厚度与集体无意识回音的层深度。古典文脉和词谱惯性的潜隐继承度。
          - generic [ref=e136]: "\"每拂拭一圈词章，总会发出远古铜镜或斑驳竹简的干涩回声。\""
